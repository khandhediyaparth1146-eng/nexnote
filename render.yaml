services:
  # ----------------------------------------------------------------------------
  # 1. Backend Service (Node.js)
  # ----------------------------------------------------------------------------
  - type: web
    name: nexnote-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

  # ----------------------------------------------------------------------------
  # 2. AI Microservice (Python)
  # ----------------------------------------------------------------------------
  - type: web
    name: nexnote-ai
    env: python
    plan: free
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
